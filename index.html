<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maha PWD Estimator - Maharashtra PWD Online Estimate Tool</title>
  <meta name="description" content="Maharashtra Public Works Department online estimate tool. SSR rates, lead charges, royalty, GST included.">
  <meta name="keywords" content="Maha PWD Estimator, Maharashtra PWD, Public Works Department Estimate, PWD SSR Rates, Construction Estimate Maharashtra">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://mahapwdestimator.in/">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#1a2a3a;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center}

    #maintBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
      background:linear-gradient(90deg,#e65100,#bf360c);color:#fff;
      padding:.7rem 1.2rem;font-size:.82rem;font-weight:700;
      box-shadow:0 3px 10px rgba(0,0,0,.4);
      align-items:center;justify-content:center;gap:.7rem;
      text-align:center;line-height:1.5;flex-wrap:wrap}
    #maintBanner.show{display:flex}
    .mc{cursor:pointer;font-size:1.1rem;opacity:.8;padding:.1rem .4rem;flex-shrink:0}
    .mc:hover{opacity:1}

    .loader{text-align:center;color:rgba(255,255,255,.7);font-size:.82rem}
    .spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;
      animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="maintBanner">
  <span>🚧</span>
  <span id="maintMsg">Scheduled maintenance in progress. Please check back shortly.</span>
  <span class="mc" onclick="this.parentElement.classList.remove('show')">✕</span>
</div>

<div class="loader">
  <div class="spinner"></div>
  Loading Maha PWD Estimator...
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCdH-k3hH1mYYcND0cBf7J2pLRG6xQydrU",
    authDomain: "atp-maha-pwd.firebaseapp.com",
    projectId: "atp-maha-pwd",
    storageBucket: "atp-maha-pwd.firebasestorage.app",
    messagingSenderId: "382409286731",
    appId: "1:382409286731:web:37daae9842bc3687bf99ce"
  });

  firebase.firestore().collection("config").doc("app").get()
    .then(function(doc) {
      var delay = 400;
      if (doc.exists) {
        var maint = doc.data().maintenance || {};
        if (maint.active) {
          var msg = maint.message || "Scheduled maintenance in progress.";
          if (maint.from && maint.to) {
            msg = "Scheduled Maintenance: " + maint.from + " – " + maint.to
                + ".  Please complete your work before that time.";
          }
          document.getElementById("maintMsg").textContent = "🚧  " + msg;
          document.getElementById("maintBanner").classList.add("show");
          delay = 4000; // show banner for 4 sec before redirecting
        }
      }
      setTimeout(function() {
        window.location.replace("ATP_MAHA_PWD_APP.html");
      }, delay);
    })
    .catch(function() {
      // Firestore failed — redirect anyway, no loop
      window.location.replace("ATP_MAHA_PWD_APP.html");
    });
</script>

</body>
</html>
