  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a237e 0%, #283593 40%, #0277bd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a237e, #0277bd);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      color: #fff;
    }

    .logo {
      font-size: 2.2rem;
      margin-bottom: .4rem;
    }

    .card-header h1 {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: .03em;
    }

    .card-header p {
      font-size: .75rem;
      opacity: .8;
      margin-top: .25rem;
    }

    .card-body {
      padding: 1.8rem 1.8rem 1.5rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 1.4rem;
    }

    .tab-btn {
      flex: 1;
      padding: .6rem;
      background: none;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }

    .tab-btn.active {
      color: #1a237e;
      border-bottom-color: #1a237e;
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Form */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: .3rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: .88rem;
      outline: none;
      transition: border .2s;
    }

    input:focus { border-color: #1a237e; }

    .btn {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: .7rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1a237e, #0277bd);
      color: #fff;
    }

    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }

    .btn-google {
      background: #fff;
      color: #333;
      border: 1.5px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      font-size: .88rem;
    }

    .btn-google:hover { background: #f5f5f5; }

    .btn-google img { width: 20px; height: 20px; }

    .divider {
      text-align: center;
      position: relative;
      margin: .8rem 0;
      color: #aaa;
      font-size: .75rem;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .forgot {
      text-align: right;
      margin-top: -.5rem;
      margin-bottom: .8rem;
    }

    .forgot a {
      font-size: .72rem;
      color: #0277bd;
      text-decoration: none;
    }

    .msg {
      padding: .6rem .9rem;
      border-radius: 7px;
      font-size: .78rem;
      margin-bottom: .8rem;
      display: none;
    }

    .msg.error { background: #ffebee; color: #c62828; display: block; }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.info { background: #e3f2fd; color: #1565c0; display: block; }

    .loading {
      display: none;
      text-align: center;
      padding: 1rem;
      color: #1a237e;
      font-size: .85rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #c5cae9;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      font-size: .68rem;
      color: #aaa;
      padding: .8rem 1.5rem 1.2rem;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>

    <h1>Maha PWD Estimator</h1>
    <p>Maharashtra Public Works Department</p>
  </div>

  <div class="card-body">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN TAB -->
    <div id="tab-login" class="tab-pane active">
      <div id="login-msg" class="msg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <div class="forgot">
        <a href="#" onclick="forgotPassword()">Forgot password?</a>
      </div>

      <button class="btn btn-primary" onclick="doLogin()">Login</button>

      <div class="divider">or</div>

      <button class="btn btn-google" onclick="doGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>
    </div>

    <!-- REGISTER TAB -->
    <div id="tab-register" class="tab-pane">
      <div id="reg-msg" class="msg"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="reg-mobile" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Minimum 6 characters">
      </div>

      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>

      <div class="divider">or</div>

      <button class="btn btn-google" onclick="doGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <span class="spinner"></span> Please wait...
    </div>

  </div>

  <div class="footer-note">
    Maharashtra PWD Estimate Tool &copy; 2025
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCdH-k3hH1mYYcND0cBf7J2pLRG6xQydrU",
    authDomain: "atp-maha-pwd.firebaseapp.com",
    projectId: "atp-maha-pwd",
    storageBucket: "atp-maha-pwd.firebasestorage.app",
    messagingSenderId: "382409286731",
    appId: "1:382409286731:web:37daae9842bc3687bf99ce"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Check if already logged in
  auth.onAuthStateChanged(function(user) {
    if (user) {
      window.location.replace('ATP_MAHA_PWD_APP.html');
    }
  });

  // Tab switch
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b, i) {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    clearMsgs();
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function clearMsgs() {
    ['login-msg','reg-msg'].forEach(function(id) {
      var el = document.getElementById(id);
      el.className = 'msg';
      el.textContent = '';
    });
  }

  function setLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.querySelectorAll('.btn').forEach(function(b) { b.disabled = show; });
  }

  // Login
  function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('login-msg', 'Please enter email and password.', 'error'); return; }
    setLoading(true);
    auth.signInWithEmailAndPassword(email, pass)
      .then(function() { window.location.replace('ATP_MAHA_PWD_APP.html'); })
      .catch(function(e) {
        setLoading(false);
        showMsg('login-msg', getErrMsg(e.code), 'error');
      });
  }

  // Register
  function doRegister() {
    var name   = document.getElementById('reg-name').value.trim();
    var mobile = document.getElementById('reg-mobile').value.trim();
    var email  = document.getElementById('reg-email').value.trim();
    var pass   = document.getElementById('reg-pass').value;
    if (!name)   { showMsg('reg-msg', 'Please enter your name.', 'error'); return; }
    if (!mobile || !/^\d{10}$/.test(mobile)) { showMsg('reg-msg', 'Please enter a valid 10-digit mobile number.', 'error'); return; }
    if (!email)  { showMsg('reg-msg', 'Please enter your email.', 'error'); return; }
    if (pass.length < 6) { showMsg('reg-msg', 'Password must be at least 6 characters.', 'error'); return; }
    setLoading(true);
    auth.createUserWithEmailAndPassword(email, pass)
      .then(function(cred) {
        return cred.user.updateProfile({ displayName: name });
      })
      .then(function() {
        // Save to Firestore via main app
        window.location.replace('ATP_MAHA_PWD_APP.html');
      })
      .catch(function(e) {
        setLoading(false);
        showMsg('reg-msg', getErrMsg(e.code), 'error');
      });
  }

  // Google login
  function doGoogle() {
    setLoading(true);
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(function() { window.location.replace('ATP_MAHA_PWD_APP.html'); })
      .catch(function(e) {
        setLoading(false);
        showMsg('login-msg', getErrMsg(e.code), 'error');
      });
  }

  // Forgot password
  function forgotPassword() {
    var email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('login-msg', 'Please enter your email address first.', 'error'); return; }
    auth.sendPasswordResetEmail(email)
      .then(function() { showMsg('login-msg', 'Password reset email sent! Please check your inbox.', 'success'); })
      .catch(function(e) { showMsg('login-msg', getErrMsg(e.code), 'error'); });
  }

  // Error messages in Marathi
  function getErrMsg(code) {
    var msgs = {
      'auth/user-not-found':       'This email is not registered.',
      'auth/wrong-password':       'Incorrect password. Please try again.',
      'auth/invalid-email':        'Please enter a valid email address.',
      'auth/email-already-in-use': 'This email is already registered. Please login.',
      'auth/weak-password':        'Password is too weak. Use at least 6 characters.',
      'auth/too-many-requests':    'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Please check your internet connection.',
      'auth/popup-closed-by-user': 'Google login was cancelled.',
      'auth/invalid-credential':   'Incorrect email or password. Please try again.'
    };
    return msgs[code] || 'An error occurred. Please try again. (' + code + ')';
  }

  // Enter key support
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (document.getElementById('tab-login').classList.contains('active')) doLogin();
      else doRegister();
    }
  });
</script>

</body>
